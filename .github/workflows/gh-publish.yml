name: godot-ci
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  GODOT_VERSION: 4.6.2

jobs:
  export-game:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Export game
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Godot Export
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          relative_project_path: ./
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: List build output
        run: |
          echo "=== Build directory contents ==="
          find /home/runner/.local/share/godot/builds/ -type f 2>/dev/null || echo "no files"

      - name: Archive build
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd /home/runner/.local/share/godot/builds/windows
          zip -r /tmp/game-windows.zip .

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "/tmp/game-windows.zip"
          token: ${{ secrets.GH_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          allowUpdates: true
